<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap demo</title>
  <link rel="stylesheet" href="./assets/css/styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">

      <!-- Título a la izquierda -->
      <span class="navbar-text">
        Título principal
      </span>

      <!-- Botón para móvil -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Menú a la derecha -->
      <div class="collapse navbar-collapse" id="navbarText">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Features</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Pricing</a>
          </li>
        </ul>
      </div>

    </div>
  </nav>

  <section class="hero d-flex align-items-center">
    <div class="container">
      <div class="row justify-content-end">
        <div class="col-md-6 text-end text-white">

          <!-- Título adicional -->
          <h2 class="fw-bold">Título principal del Hero</h2>

          <!-- Texto adicional -->
          <p class="mb-4">
            Aquí puedes colocar un texto descriptivo para presentar tu página,
            promocionar un servicio o dar la bienvenida a los visitantes.
          </p>

          <h1 class="display-4">Bienvenido</h1>
          <p class="lead">Este es un hero con Bootstrap.</p>

          <!-- Formulario con input proporcional -->
          <form id="heroForm" class="mt-3">
            <div class="input-group input-group-lg">
              <input type="email" id="correo" class="form-control" placeholder="Ingresa tu correo" required>
              <button class="btn btn-primary" type="submit">Enviar</button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </section>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>
<script>
  document.addEventListener("DOMContentLoaded", function () {

    document.getElementById("heroForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const correo = document.getElementById("correo").value;

      alert("Gracias. Se enviará un correo a " + correo + " para tramitar su requerimiento.");
    });

  });
</script>


</html>
